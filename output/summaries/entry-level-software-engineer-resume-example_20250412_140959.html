
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Summary</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .info {
            margin-bottom: 10px;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        .info:last-child {
            border-bottom: none;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .summary {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Summary</h1>
        <div class="info"><strong>Full Name:</strong> John Doe</div>
        <div class="info"><strong>Email:</strong> example@email.com</div>
        <div class="info"><strong>Phone:</strong> +1-234-567-8901</div>
        <div class="info"><strong>Location:</strong> New York, USA</div>
        <div class="info"><strong>LinkedIn:</strong> <a href="https://linkedin.com/in/johndoe" target="_blank">LinkedIn Profile</a></div>
        <div class="info"><strong>Portfolio:</strong> <a href="https://github.com/example" target="_blank">Portfolio</a></div>
        <div class="summary">
            <h2>Summary</h2>
            <p>Professional with experience in DevOps Engineer related fields.</p>
        </div>
    </div>
</body>
</html>
